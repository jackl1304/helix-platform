<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .helix-text { 
        font-family: 'Arial', 'Helvetica', sans-serif; 
        font-weight: bold; 
      }
    </style>
  </defs>
  
  <!-- Dark blue square background with rounded corners -->
  <rect width="400" height="400" rx="30" ry="30" fill="#1e3a8a"/>
  
  <!-- Helix text at top (H capitalized, rest lowercase) -->
  <text x="200" y="80" class="helix-text" font-size="56" fill="white" text-anchor="middle" letter-spacing="2">
    <tspan>H</tspan><tspan style="text-transform: lowercase;">elix</tspan>
  </text>
  
  <!-- DNA Double Helix in center - X/hourglass shape with crossing strands -->
  <g transform="translate(200, 200)">
    <!-- Left strand - curves from top-left, crosses to bottom-right -->
    <path d="M -50 -50 Q -25 -25, 0 0 Q 25 25, 50 50" 
          fill="none" 
          stroke="white" 
          stroke-width="9" 
          stroke-linecap="round"/>
    
    <!-- Right strand - curves from top-right, crosses to bottom-left -->
    <path d="M 50 -50 Q 25 -25, 0 0 Q -25 25, -50 50" 
          fill="none" 
          stroke="white" 
          stroke-width="9" 
          stroke-linecap="round"/>
    
    <!-- 5 Base pairs (horizontal connecting lines, slightly curved following the helix) -->
    <line x1="-40" y1="-40" x2="40" y2="-40" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="-30" y1="-20" x2="30" y2="-20" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="-30" y1="20" x2="30" y2="20" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="-40" y1="40" x2="40" y2="40" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- DELTAWAYS text at bottom (all uppercase) -->
  <text x="200" y="340" class="helix-text" font-size="40" fill="white" text-anchor="middle" letter-spacing="4" style="text-transform: uppercase;">DELTAWAYS</text>
</svg>
